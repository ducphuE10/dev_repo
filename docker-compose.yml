services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dupe_hunt
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dupe_hunt"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - dupe-hunt-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - dupe-hunt-redis:/data

volumes:
  dupe-hunt-postgres:
  dupe-hunt-redis:
